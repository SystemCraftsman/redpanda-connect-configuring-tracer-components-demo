input:
  generate:
    mapping: |
      root.user_id = uuid_v4()
      root.event = "purchase"
      root.amount = random_int(min: 1, max: 500)
    interval: 1s
    count: 20

pipeline:
  processors:
    - bloblang: |
        root = this
        root.currency = "USD"
        root.processed_at = now()
    - log:
        message: "Processed event for user ${!json(\"user_id\")}"

output:
  stdout: {}

tracer:
  open_telemetry_collector:
    service: purchase-pipeline
    grpc:
      - address: localhost:4317
    tags:
      env: local
    sampling:
      enabled: false
